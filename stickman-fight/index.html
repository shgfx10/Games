<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickman Fight!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff6b6b;
        }

        canvas {
            border: 3px solid #ff6b6b;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn-punch {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
        }

        .btn-kick {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
        }

        .btn-block {
            background: linear-gradient(135deg, #ffe66d, #f7971e);
            color: #333;
        }

        .btn-special {
            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: white;
        }

        .btn-reset {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            color: white;
        }

        .btn-auto {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .health-bars {
            display: flex;
            gap: 50px;
            margin-bottom: 20px;
        }

        .health-bar {
            width: 200px;
            text-align: center;
        }

        .health-bar .name {
            color: #fff;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .health-bar .bar {
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #555;
        }

        .health-bar .fill {
            height: 100%;
            transition: width 0.3s;
            border-radius: 8px;
        }

        .health-bar.p1 .fill {
            background: linear-gradient(90deg, #ff6b6b, #ff8e8e);
        }

        .health-bar.p2 .fill {
            background: linear-gradient(90deg, #4ecdc4, #7dd3d0);
        }

        .instructions {
            color: #888;
            margin-top: 15px;
            font-size: 14px;
            text-align: center;
        }

        .instructions kbd {
            background: #333;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #555;
            color: #fff;
        }

        .d-pad {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .dpad-container {
            text-align: center;
        }

        .dpad-container .label {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 40px);
            grid-template-rows: repeat(3, 40px);
            gap: 2px;
        }

        .dpad-btn {
            background: #333;
            border: 1px solid #555;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.1s;
        }

        .dpad-btn:hover {
            background: #555;
        }

        .dpad-btn:active {
            background: #ff6b6b;
            transform: scale(0.95);
        }

        .dpad-btn.p2:active {
            background: #4ecdc4;
        }

        .dpad-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .dpad-center {
            background: #222 !important;
            border: none !important;
        }
    </style>
</head>
<body>
    <h1>STICKMAN FIGHT!</h1>

    <div class="health-bars">
        <div class="health-bar p1">
            <div class="name">PLAYER 1</div>
            <div class="bar"><div class="fill" id="hp1" style="width: 100%"></div></div>
        </div>
        <div class="health-bar p2">
            <div class="name">PLAYER 2</div>
            <div class="bar"><div class="fill" id="hp2" style="width: 100%"></div></div>
        </div>
    </div>

    <canvas id="game" width="800" height="400"></canvas>

    <div class="controls">
        <button class="btn btn-punch" onclick="player1Punch()">👊 Punch</button>
        <button class="btn btn-kick" onclick="player1Kick()">🦵 Kick</button>
        <button class="btn btn-block" onclick="player1Block()">🛡️ Block</button>
        <button class="btn btn-special" onclick="player1Special()">💥 Special</button>
        <button class="btn btn-auto" onclick="toggleAuto()">🤖 Auto Fight</button>
        <button class="btn btn-reset" onclick="resetGame()">🔄 Reset</button>
    </div>

    <div class="d-pad">
        <div class="dpad-container">
            <div class="label">PLAYER 1</div>
            <div class="dpad">
                <div></div>
                <button class="dpad-btn" onclick="p1Jump()">⬆️</button>
                <div></div>
                <button class="dpad-btn" onclick="p1MoveLeft()">⬅️</button>
                <div class="dpad-center"></div>
                <button class="dpad-btn" onclick="p1MoveRight()">➡️</button>
                <div></div>
                <button class="dpad-btn" onclick="p1Crouch()">⬇️</button>
                <div></div>
            </div>
        </div>
        <div class="dpad-container">
            <div class="label">PLAYER 2</div>
            <div class="dpad">
                <div></div>
                <button class="dpad-btn p2" onclick="p2Jump()">⬆️</button>
                <div></div>
                <button class="dpad-btn p2" onclick="p2MoveLeft()">⬅️</button>
                <div class="dpad-center"></div>
                <button class="dpad-btn p2" onclick="p2MoveRight()">➡️</button>
                <div></div>
                <button class="dpad-btn p2" onclick="p2Crouch()">⬇️</button>
                <div></div>
            </div>
        </div>
    </div>

    <div class="instructions">
        <p>Player 1: <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move | <kbd>J</kbd> Punch | <kbd>K</kbd> Kick | <kbd>L</kbd> Block | <kbd>U</kbd> Special</p>
        <p>Player 2: <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd> Move | <kbd>1</kbd> Punch | <kbd>2</kbd> Kick | <kbd>3</kbd> Block | <kbd>4</kbd> Special</p>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        let autoFight = false;
        let autoInterval = null;

        class Stickman {
            constructor(x, y, color, facing) {
                this.x = x;
                this.y = y;
                this.baseY = y;
                this.color = color;
                this.facing = facing;
                this.hp = 100;
                this.maxHp = 100;
                this.state = 'idle';
                this.stateTimer = 0;
                this.animFrame = 0;
                this.isBlocking = false;
                this.hitStun = 0;
                this.scale = 1;
                this.velocityY = 0;
                this.isJumping = false;
                this.isCrouching = false;
                this.moveSpeed = 5;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.facing, 1);
                ctx.scale(this.scale, this.scale);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';

                let armAngle = 0;
                let legAngle = 0;
                let bodyOffset = 0;

                if (this.isCrouching) {
                    bodyOffset = 15;
                }

                if (this.state === 'punch' && this.stateTimer > 0) {
                    armAngle = -Math.PI / 2;
                    bodyOffset = 20;
                } else if (this.state === 'kick' && this.stateTimer > 0) {
                    legAngle = -Math.PI / 3;
                    bodyOffset = 15;
                } else if (this.state === 'block' && this.stateTimer > 0) {
                    armAngle = -Math.PI / 4;
                } else if (this.state === 'special' && this.stateTimer > 0) {
                    armAngle = -Math.PI;
                    bodyOffset = 30;
                    this.scale = 1.1;
                } else if (this.hitStun > 0) {
                    bodyOffset = -10;
                    this.scale = 0.95;
                } else {
                    armAngle = Math.sin(this.animFrame * 0.1) * 0.2;
                    legAngle = Math.sin(this.animFrame * 0.1 + Math.PI) * 0.3;
                }

                // Body
                ctx.beginPath();
                ctx.moveTo(0, bodyOffset);
                ctx.lineTo(0, 40 + bodyOffset);
                ctx.stroke();

                // Head
                ctx.beginPath();
                ctx.arc(0, -10 + bodyOffset, 15, 0, Math.PI * 2);
                ctx.stroke();

                // Arms
                ctx.save();
                ctx.translate(0, 15 + bodyOffset);
                ctx.rotate(armAngle);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(-25, 15);
                ctx.stroke();
                ctx.restore();

                ctx.save();
                ctx.translate(0, 15 + bodyOffset);
                ctx.rotate(-armAngle * 0.5);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(25, 15);
                ctx.stroke();
                ctx.restore();

                // Legs
                ctx.save();
                ctx.translate(0, 40 + bodyOffset);
                ctx.rotate(legAngle);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(-15, 30);
                ctx.stroke();
                ctx.restore();

                ctx.save();
                ctx.translate(0, 40 + bodyOffset);
                ctx.rotate(-legAngle);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(15, 30);
                ctx.stroke();
                ctx.restore();

                // Block shield
                if (this.state === 'block' && this.stateTimer > 0) {
                    ctx.strokeStyle = '#ffe66d';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 20, 35, -Math.PI/3, Math.PI/3);
                    ctx.stroke();
                }

                // Special effect
                if (this.state === 'special' && this.stateTimer > 15) {
                    ctx.strokeStyle = '#a855f7';
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 8; i++) {
                        const angle = (i / 8) * Math.PI * 2 + this.animFrame * 0.2;
                        const r = 50 + Math.sin(this.animFrame * 0.3) * 10;
                        ctx.beginPath();
                        ctx.arc(Math.cos(angle) * r, 20 + Math.sin(angle) * r, 5, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }

                ctx.restore();
                this.scale = 1;
            }

            update() {
                this.animFrame++;
                if (this.stateTimer > 0) {
                    this.stateTimer--;
                } else {
                    this.state = 'idle';
                }
                if (this.hitStun > 0) {
                    this.hitStun--;
                }
                
                // Jump physics
                if (this.isJumping) {
                    this.y += this.velocityY;
                    this.velocityY += 0.8;
                    if (this.y >= this.baseY) {
                        this.y = this.baseY;
                        this.isJumping = false;
                        this.velocityY = 0;
                    }
                }
                
                // Auto face opponent
                if (this === p1) {
                    this.facing = p2.x > this.x ? 1 : -1;
                } else {
                    this.facing = p1.x > this.x ? 1 : -1;
                }
            }

            punch() {
                if (this.state === 'idle' && this.hitStun === 0) {
                    this.state = 'punch';
                    this.stateTimer = 15;
                    return true;
                }
                return false;
            }

            kick() {
                if (this.state === 'idle' && this.hitStun === 0) {
                    this.state = 'kick';
                    this.stateTimer = 20;
                    return true;
                }
                return false;
            }

            block() {
                if (this.state === 'idle' && this.hitStun === 0) {
                    this.state = 'block';
                    this.stateTimer = 25;
                    this.isBlocking = true;
                    return true;
                }
                return false;
            }

            special() {
                if (this.state === 'idle' && this.hitStun === 0) {
                    this.state = 'special';
                    this.stateTimer = 30;
                    return true;
                }
                return false;
            }

            moveLeft() {
                if (this.state === 'idle' || this.state === 'block') {
                    this.x = Math.max(50, this.x - this.moveSpeed);
                }
            }

            moveRight() {
                if (this.state === 'idle' || this.state === 'block') {
                    this.x = Math.min(750, this.x + this.moveSpeed);
                }
            }

            jump() {
                if (!this.isJumping && this.state === 'idle') {
                    this.isJumping = true;
                    this.velocityY = -15;
                }
            }

            crouch() {
                if (this.state === 'idle' && !this.isJumping) {
                    this.isCrouching = true;
                    this.scale = 0.8;
                }
            }

            stopCrouch() {
                this.isCrouching = false;
                this.scale = 1;
            }

            takeDamage(amount) {
                if (this.isBlocking || this.state === 'block') {
                    amount = Math.floor(amount * 0.2);
                }
                this.hp = Math.max(0, this.hp - amount);
                this.hitStun = 10;
                this.isBlocking = false;
            }
        }

        let p1 = new Stickman(200, 280, '#ff6b6b', 1);
        let p2 = new Stickman(600, 280, '#4ecdc4', -1);

        let hitEffects = [];
        let particles = [];

        function createHitEffect(x, y, type) {
            hitEffects.push({
                x, y,
                type,
                timer: 20,
                maxTimer: 20
            });
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10 - 5,
                    life: 30,
                    color
                });
            }
        }

        function checkHit(attacker, defender, damage) {
            const dist = Math.abs(attacker.x - defender.x);
            if (dist < 100 && attacker.stateTimer === 10) {
                defender.takeDamage(damage);
                createHitEffect((attacker.x + defender.x) / 2, attacker.y - 20, attacker.state);
                createParticles((attacker.x + defender.x) / 2, attacker.y - 20, attacker.color, 10);
                updateHealthBars();
            }
        }

        function updateHealthBars() {
            document.getElementById('hp1').style.width = p1.hp + '%';
            document.getElementById('hp2').style.width = p2.hp + '%';
        }

        function drawBackground() {
            // Gradient sky
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Ground
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 350, canvas.width, 50);

            // Ground line
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, 350);
            ctx.lineTo(canvas.width, 350);
            ctx.stroke();
        }

        function drawEffects() {
            hitEffects.forEach((effect, i) => {
                const progress = 1 - effect.timer / effect.maxTimer;
                const alpha = effect.timer / effect.maxTimer;
                const size = 30 + progress * 30;

                ctx.save();
                ctx.translate(effect.x, effect.y);
                ctx.globalAlpha = alpha;

                if (effect.type === 'punch') {
                    ctx.strokeStyle = '#ff6b6b';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, size, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.fillStyle = '#ff6b6b';
                    ctx.font = 'bold 24px Arial';
                    ctx.fillText('POW!', -30, -10);
                } else if (effect.type === 'kick') {
                    ctx.strokeStyle = '#4ecdc4';
                    ctx.lineWidth = 3;
                    for (let j = 0; j < 3; j++) {
                        ctx.beginPath();
                        ctx.arc(0, 0, size - j * 10, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    ctx.fillStyle = '#4ecdc4';
                    ctx.font = 'bold 24px Arial';
                    ctx.fillText('WHACK!', -40, -10);
                } else if (effect.type === 'special') {
                    ctx.fillStyle = '#a855f7';
                    ctx.font = 'bold 32px Arial';
                    ctx.fillText('SPECIAL!', -50, -10);
                    ctx.strokeStyle = '#a855f7';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(0, 0, size * 1.5, 0, Math.PI * 2);
                    ctx.stroke();
                }

                ctx.restore();
                effect.timer--;
            });

            hitEffects = hitEffects.filter(e => e.timer > 0);

            particles.forEach((p, i) => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3;
                p.life--;
            });
            ctx.globalAlpha = 1;
            particles = particles.filter(p => p.life > 0);
        }

        function drawUI() {
            // Round indicator
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('FIGHT!', canvas.width / 2, 30);

            // Timer
            if (p1.hp <= 0 || p2.hp <= 0) {
                ctx.font = 'bold 48px Arial';
                ctx.fillStyle = p1.hp <= 0 ? '#4ecdc4' : '#ff6b6b';
                ctx.fillText(p1.hp <= 0 ? 'PLAYER 2 WINS!' : 'PLAYER 1 WINS!', canvas.width / 2, canvas.height / 2);
            }
        }

        function gameLoop() {
            drawBackground();

            p1.update();
            p2.update();

            p1.draw();
            p2.draw();

            if (p1.state === 'punch' || p1.state === 'kick' || p1.state === 'special') {
                checkHit(p1, p2, p1.state === 'special' ? 25 : p1.state === 'kick' ? 15 : 10);
            }
            if (p2.state === 'punch' || p2.state === 'kick' || p2.state === 'special') {
                checkHit(p2, p1, p2.state === 'special' ? 25 : p2.state === 'kick' ? 15 : 10);
            }

            drawEffects();
            drawUI();

            requestAnimationFrame(gameLoop);
        }

        function player1Punch() { p1.punch(); }
        function player1Kick() { p1.kick(); }
        function player1Block() { p1.block(); }
        function player1Special() { p1.special(); }

        function player2Punch() { p2.punch(); }
        function player2Kick() { p2.kick(); }
        function player2Block() { p2.block(); }
        function player2Special() { p2.special(); }

        // Movement functions
        function p1MoveLeft() { p1.moveLeft(); }
        function p1MoveRight() { p1.moveRight(); }
        function p1Jump() { p1.jump(); }
        function p1Crouch() { p1.crouch(); setTimeout(() => p1.stopCrouch(), 200); }

        function p2MoveLeft() { p2.moveLeft(); }
        function p2MoveRight() { p2.moveRight(); }
        function p2Jump() { p2.jump(); }
        function p2Crouch() { p2.crouch(); setTimeout(() => p2.stopCrouch(), 200); }

        function resetGame() {
            p1.hp = 100;
            p2.hp = 100;
            p1.state = 'idle';
            p2.state = 'idle';
            p1.hitStun = 0;
            p2.hitStun = 0;
            updateHealthBars();
        }

        function aiMove() {
            if (p2.hp <= 0 || p1.hp <= 0) return;

            const dist = Math.abs(p1.x - p2.x);
            const rand = Math.random();

            if (dist < 120) {
                if (rand < 0.3) p2.punch();
                else if (rand < 0.5) p2.kick();
                else if (rand < 0.7) p2.block();
                else if (rand < 0.85) p2.special();
                else p2.jump();
            } else if (dist < 300) {
                if (rand < 0.6) p2.moveLeft();
                else if (rand < 0.8) p2.jump();
                else p2.block();
            } else {
                if (rand < 0.7) p2.moveLeft();
                else p2.jump();
            }
        }

        function toggleAuto() {
            autoFight = !autoFight;
            if (autoFight) {
                autoInterval = setInterval(() => {
                    aiMove();
                    if (Math.random() < 0.3) {
                        const moves = ['punch', 'kick', 'special'];
                        const move = moves[Math.floor(Math.random() * moves.length)];
                        p1[move]();
                    }
                }, 500);
            } else {
                clearInterval(autoInterval);
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                // Player 1 movement
                case 'w': e.preventDefault(); p1.jump(); break;
                case 'a': e.preventDefault(); p1.moveLeft(); break;
                case 's': e.preventDefault(); p1.crouch(); setTimeout(() => p1.stopCrouch(), 200); break;
                case 'd': e.preventDefault(); p1.moveRight(); break;
                // Player 1 attacks
                case 'j': p1.punch(); break;
                case 'k': p1.kick(); break;
                case 'l': p1.block(); break;
                case 'u': p1.special(); break;
                
                // Player 2 movement
                case 'arrowup': e.preventDefault(); p2.jump(); break;
                case 'arrowleft': e.preventDefault(); p2.moveLeft(); break;
                case 'arrowdown': e.preventDefault(); p2.crouch(); setTimeout(() => p2.stopCrouch(), 200); break;
                case 'arrowright': e.preventDefault(); p2.moveRight(); break;
                // Player 2 attacks
                case '1': p2.punch(); break;
                case '2': p2.kick(); break;
                case '3': p2.block(); break;
                case '4': p2.special(); break;
            }
        });

        gameLoop();
    </script>
</body>
</html>
